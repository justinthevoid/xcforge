name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Build Release
        run: swift build -c release

  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: swift-format lint
        run: swift format lint --strict --recursive Sources/ Tests/
