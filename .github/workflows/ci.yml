name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Build Release
        run: swift build -c release

  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: swift-format lint
        run: swift format lint --strict --recursive Sources/ Tests/

  website-build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install website dependencies
        run: bun install --frozen-lockfile

      - name: Build website
        run: bun run build

      - name: Upload Story 5.3 remediation tasks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-story-5-3-remediation
          path: |
            ${{ github.workspace }}/_bmad-output/implementation-artifacts/story-5-3-remediation-tasks.md
            ${{ github.workspace }}/_bmad-output/implementation-artifacts/story-5-3-remediation-tasks.json
          if-no-files-found: ignore
